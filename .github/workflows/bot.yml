name: Run Bot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pyTelegramBotAPI

      - env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python bot.py
